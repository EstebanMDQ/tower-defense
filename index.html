<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0d1b2a" />
    <!-- Allow a chromeless, fullscreen experience when added to the home screen
         (the iOS path, since iOS Safari blocks the Fullscreen API). -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tower Defense" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>Tower Defense</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0d1b2a;
        overflow: hidden;
      }
      /*
        #safe fills the screen but keeps its content inside the device safe area:
        - 100dvh uses the dynamic viewport height, so it excludes the iOS Safari
          toolbars (fixes HUD buttons hidden behind the bottom bar).
        - env(safe-area-inset-*) padding keeps content clear of the notch and the
          home indicator (fixes the portal hidden under the notch).
      */
      #safe {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="safe">
      <div id="game"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
